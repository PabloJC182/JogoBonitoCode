<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas del Partido - Tokens</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('https://cloudfront-us-east-1.images.arcpublishing.com/eluniverso/ZKWPGPBUINDCLKJGF2EIHJXOFA.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }
        .overlay {
            background: rgba(4, 16, 58, 0.6);
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
        }
        .contenedor {
            width: 80%; margin: 40px auto;
        }
        h1 {
            text-align: center; font-size: 3em; font-weight: 900;
            color: #D4AF37; text-transform: uppercase; letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }
        table {
            width: 100%; border-collapse: collapse; margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        th {
            background: linear-gradient(90deg, #0e194f, #1a2a6c);
            color: white; padding: 20px; font-size: 1.2em;
            text-transform: uppercase; border-bottom: 3px solid #D4AF37;
        }
        td {
            padding: 15px; text-align: center; font-size: 1.1em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        tr:hover { background: rgba(255, 255, 255, 0.15); transition: 0.3s; }
        .highlight { color: #00f0ff; font-weight: bold; }
        .silver { color: #c0c0c0; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="contenedor">
        <h1>🏆 Análisis de Pases (Tokens) 🏆</h1>
        <table>
            <tr><th>#</th><th>Jugada (Lexema)</th><th>Tipo de Pase (Token)</th><th>Minuto (Línea)</th><th>Posición (Col)</th></tr>
            <tr>
                <td>1</td>
                <td class="highlight">IniciarPartido</td>
                <td class="silver">IniciarPartido</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td class="highlight">InicioPartido</td>
                <td class="silver">InicioPartido</td>
                <td>2</td>
                <td>1</td>
            </tr>
            <tr>
                <td>3</td>
                <td class="highlight">Dorsal</td>
                <td class="silver">Dorsal</td>
                <td>5</td>
                <td>5</td>
            </tr>
            <tr>
                <td>4</td>
                <td class="highlight">suma</td>
                <td class="silver">IDENTIFICADOR</td>
                <td>5</td>
                <td>12</td>
            </tr>
            <tr>
                <td>5</td>
                <td class="highlight">Ficha</td>
                <td class="silver">Ficha</td>
                <td>5</td>
                <td>17</td>
            </tr>
            <tr>
                <td>6</td>
                <td class="highlight">0</td>
                <td class="silver">ENTERO</td>
                <td>5</td>
                <td>23</td>
            </tr>
            <tr>
                <td>7</td>
                <td class="highlight">FinJugada</td>
                <td class="silver">FinJugada</td>
                <td>5</td>
                <td>25</td>
            </tr>
        </table>
    </div>
</body>
</html>
